<!DOCTYPE html>
<html>

  {% include head.html %}

  <body>

    {% include header.html %}

        {{ content }}

    {% include footer.html %}
    {% include backToTop.html %}
    <script src="{{ " /assets/js/main.js " | prepend: site.baseurl }}" charset="utf-8"></script>
    <script src="{{ "/assets/js/smooth-scroll.min.js " | prepend: site.baseurl }}" charset="utf-8"></script>
    <script type="text/javascript">
      smoothScroll.init({
        speed: 500, // Integer. How fast to complete the scroll in milliseconds
        easing: 'easeInOutCubic', // Easing pattern to use
        offset: 20, // Integer. How far to offset the scrolling anchor location in pixels
      });
    </script>
    <!-- <script src="{{ " /assets/js/scroll.min.js " | prepend: site.baseurl }}" charset="utf-8"></script> -->
	
	<!-- Search -->
	<script src="{{ site.baseurl }}/assets/js/simple-jekyll-search.min.js"></script>
	<script type="text/javascript">
		var sjs = SimpleJekyllSearch({
			searchInput: document.getElementById('local-search-input'),
			resultsContainer: document.getElementById('local-search-result'),
			json: '/search.json'
		})
	</script>
	
  </body>

</html>
